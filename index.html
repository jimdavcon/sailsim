<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Autonomous Sailboat: 2000ft Strategic View</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #002b36; font-family: 'Courier New', monospace; display: flex; height: 100vh; }
        #world-container { width: 90%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #586e75; }
        #ui-sidebar { width: 10%; height: 100%; background: #002b36; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; color: #859900; min-width: 170px; z-index: 10; }
        .section { margin-bottom: 20px; border-bottom: 1px solid #073642; padding-bottom: 10px; }
        .label { font-size: 10px; color: #93a1a1; text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; accent-color: #859900; cursor: pointer; }
        #telemetry { color: #268bd2; font-size: 11px; white-space: pre-wrap; line-height: 1.5; }
        h3 { font-size: 14px; margin: 0 0 15px 0; color: #b58900; border-bottom: 2px solid #b58900; }
    </style>
</head>
<body>

<div id="world-container"><canvas id="simCanvas"></canvas></div>

<div id="ui-sidebar">
    <h3>2000ft VIEW</h3>
    <div class="section">
        <div class="label">Wind Control</div>
        <input type="range" id="windDir" min="0" max="360" value="0">
        Dir: <span id="wdVal">0</span>°<br>
        <input type="range" id="windSpd" min="0" max="40" value="15">
        Spd: <span id="wsVal">15</span> kts
    </div>
    <div class="section">
        <div class="label">Mission Data</div>
        <div id="telemetry">Initialzing...</div>
    </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('world-container');

// Physics & Scale Constants
let WORLD_SIZE_FT = 2000;
let PX_PER_FT; 
const KNOTS_TO_FTS = 1.68781;
const RHO_AIR = 0.00237; 
const RHO_WATER = 1.99;
const STALL_LIMIT = 0.25;

let wind = { angle: 0, speed: 15 * KNOTS_TO_FTS };
let waypoints = [];
let currentWPIndex = 0;
let tackState = 1; 

const boat = {
    l: 6, w: 1.5, mass: 50, inertia: 90,
    x: 0, y: 0, theta: 0, vx: 0, vy: 0, omega: 0,
    sails: [{ x_off: 2, alpha: 0, angle: 0 }, { x_off: -2, alpha: 0, angle: 0 }]
};

function resize() {
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    // Scale so largest dimension is 2000ft
    PX_PER_FT = Math.max(canvas.width, canvas.height) / WORLD_SIZE_FT;
    if (waypoints.length === 0) initMission();
}

function initMission() {
    waypoints = [{ x: 0, y: 0, r: 50 * PX_PER_FT }];
    for(let i=0; i<4; i++) {
        let last = waypoints[i], nx, ny, dist, attempts = 0;
        do {
            nx = (Math.random() - 0.5) * (WORLD_SIZE_FT * 0.8) * PX_PER_FT;
            ny = (Math.random() - 0.5) * (WORLD_SIZE_FT * 0.8) * PX_PER_FT;
            dist = Math.hypot(nx - last.x, ny - last.y);
            attempts++;
        } while (dist < 100 * PX_PER_FT && attempts < 100);
        waypoints.push({ x: nx, y: ny, r: (50 + Math.random() * 50) * PX_PER_FT });
    }
}

document.getElementById('windDir').oninput = e => { wind.angle = e.target.value * Math.PI/180; document.getElementById('wdVal').innerText = e.target.value; };
document.getElementById('windSpd').oninput = e => { wind.speed = e.target.value * KNOTS_TO_FTS; document.getElementById('wsVal').innerText = e.target.value; };

function getTangents(c1, c2) {
    const dx = c2.x - c1.x, dy = c2.y - c1.y, dist = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx), dr = c1.r - c2.r;
    if (dist < Math.abs(dr)) return [];
    const angleOffset = Math.acos(dr / dist);
    return [
        { x1: c1.x + c1.r * Math.cos(angle + angleOffset), y1: c1.y + c1.r * Math.sin(angle + angleOffset),
          x2: c2.x + c2.r * Math.cos(angle + angleOffset), y2: c2.y + c2.r * Math.sin(angle + angleOffset) },
        { x1: c1.x + c1.r * Math.cos(angle - angleOffset), y1: c1.y + c1.r * Math.sin(angle - angleOffset),
          x2: c2.x + c2.r * Math.cos(angle - angleOffset), y2: c2.y + c2.r * Math.sin(angle - angleOffset) }
    ];
}

function update(dt) {
    const pA = waypoints[currentWPIndex];
    const pB = waypoints[(currentWPIndex + 1) % waypoints.length];
    
    const dx = pB.x - pA.x, dy = pB.y - pA.y, pathLen = Math.hypot(dx, dy);
    const uX = dx / pathLen, uY = dy / pathLen;
    const atd = (boat.x - pA.x) * uX + (boat.y - pA.y) * uY;
    const cte = (boat.x - pA.x) * (-uY) + (boat.y - pA.y) * uX;
    const corridorR = pA.r + (Math.max(0, Math.min(1, atd/pathLen))) * (pB.r - pA.r);

    if (atd > pathLen) currentWPIndex = (currentWPIndex + 1) % waypoints.length;
    if (Math.abs(cte) > corridorR * 0.9) tackState = (cte > 0) ? -1 : 1;

    // Target Logic
    const targetX = pA.x + (atd + 150 * PX_PER_FT) * uX + (tackState * corridorR * 0.8) * (-uY);
    const targetY = pA.y + (atd + 150 * PX_PER_FT) * uY + (tackState * corridorR * 0.8) * uX;
    let hErr = Math.atan2(targetY - boat.y, targetX - boat.x) - boat.theta;
    while(hErr > Math.PI) hErr -= 2*Math.PI; while(hErr < -Math.PI) hErr += 2*Math.PI;

    // Physics
    const steerCmd = (hErr * 1.5) - (boat.omega * 4.0);
    let fx = 0, fy = 0, mz = 0;
    const twX = wind.speed * Math.cos(wind.angle), twY = wind.speed * Math.sin(wind.angle);

    boat.sails.forEach((s, i) => {
        const awX = twX - boat.vx, awY = twY - boat.vy;
        const awL = Math.atan2(awY, awX) - boat.theta;
        s.alpha = Math.max(-STALL_LIMIT, Math.min(STALL_LIMIT, (Math.sign(Math.sin(awL))*-0.2) + (i===0?steerCmd:-steerCmd)));
        const cl = 5.7 * s.alpha, cd = 0.015 + 0.05 * cl*cl;
        const qA = 0.5 * RHO_AIR * (awX**2 + awY**2) * 4;
        const lF = (qA*cl*Math.sin(s.alpha) - qA*cd*Math.cos(s.alpha));
        const sFy = (-qA*cl*Math.cos(s.alpha) - qA*cd*Math.sin(s.alpha));
        fx += lF * Math.cos(awL) - sFy * Math.sin(awL);
        const bFy = lF * Math.sin(awL) + sFy * Math.cos(awL);
        fy += bFy; mz += (bFy * s.x_off);
        s.angle = Math.atan2(awY, awX) + s.alpha;
    });

    const vL = boat.vx * Math.cos(boat.theta) + boat.vy * Math.sin(boat.theta);
    const vS = -boat.vx * Math.sin(boat.theta) + boat.vy * Math.cos(boat.theta);
    const hQ = 0.5 * RHO_WATER * (vL**2 + vS**2) * (boat.l * 1.2);
    const hAlpha = Math.atan2(vS, vL);
    fx += (hQ*5.7*hAlpha*Math.sin(hAlpha) - hQ*0.02*Math.cos(hAlpha));
    fy += (-hQ*5.7*hAlpha*Math.cos(hAlpha));

    boat.vx += (fx * Math.cos(boat.theta) - fy * Math.sin(boat.theta)) / boat.mass * dt;
    boat.vy += (fx * Math.sin(boat.theta) + fy * Math.cos(boat.theta)) / boat.mass * dt;
    boat.omega += (mz - boat.omega * 60) / boat.inertia * dt;
    boat.x += boat.vx * dt * PX_PER_FT * 30; boat.y += boat.vy * dt * PX_PER_FT * 30;
    boat.theta += boat.omega * dt;

    // Wrap
    const hw = (WORLD_SIZE_FT/2) * PX_PER_FT, hh = (WORLD_SIZE_FT/2) * PX_PER_FT;
    if (boat.x < -hw) boat.x = hw; else if (boat.x > hw) boat.x = -hw;
    if (boat.y < -hh) boat.y = hh; else if (boat.y > hh) boat.y = -hh;

    document.getElementById('telemetry').innerText = 
        `ATD: ${(atd/PX_PER_FT).toFixed(0)} ft\nCTE: ${(cte/PX_PER_FT).toFixed(1)} ft\nLIMIT: ${(corridorR/PX_PER_FT).toFixed(0)} ft\nTACK: ${tackState>0?'PORT':'STBD'}`;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);

    // 2000ft Boundary
    ctx.strokeStyle = "#073642"; ctx.strokeRect(-(WORLD_SIZE_FT/2)*PX_PER_FT, -(WORLD_SIZE_FT/2)*PX_PER_FT, WORLD_SIZE_FT*PX_PER_FT, WORLD_SIZE_FT*PX_PER_FT);

    waypoints.forEach((wp, i) => {
        const next = waypoints[(i+1)%waypoints.length];
        const tangents = getTangents(wp, next);
        ctx.strokeStyle = (i === currentWPIndex) ? "rgba(133, 153, 0, 0.5)" : "rgba(88, 110, 117, 0.1)";
        ctx.beginPath(); tangents.forEach(t => { ctx.moveTo(t.x1, t.y1); ctx.lineTo(t.x2, t.y2); }); ctx.stroke();
        ctx.beginPath(); ctx.arc(wp.x, wp.y, wp.r, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = (i===0)?"#268bd2":"#cb4b16"; ctx.beginPath(); ctx.arc(wp.x, wp.y, 3, 0, Math.PI*2); ctx.fill();
    });

    ctx.save(); ctx.translate(boat.x, boat.y); ctx.rotate(boat.theta);
    ctx.strokeStyle = "#eee8d5";
    // Boat is small at this scale, so we draw it slightly larger for visibility
    const bSize = 2 * PX_PER_FT * 5; 
    ctx.strokeRect(-bSize*2, -bSize, bSize*4, bSize*2);
    ctx.restore(); ctx.restore();
}

function loop() { update(0.016); draw(); requestAnimationFrame(loop); }
window.onresize = resize; resize(); loop();
</script>
</body>
</html>
