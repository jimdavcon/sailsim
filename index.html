<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sailboat: Boat Recovery & Motion Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #002b36; font-family: monospace; touch-action: none; }
        #world-pane { position: absolute; top: 0; left: 0; right: 240px; bottom: 0; background: #002b36; overflow: hidden; }
        #ui-sidebar { 
            position: absolute; top: 0; right: 0; width: 240px; bottom: 0; 
            background: #073642; border-left: 1px solid #586e75; 
            padding: 15px; box-sizing: border-box; color: #859900;
            display: flex; flex-direction: column; z-index: 10;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #chart-box { width: 100%; height: 140px; background: #001e26; margin-top: auto; border: 1px solid #586e75; position: relative; }
        .label { font-size: 10px; color: #93a1a1; text-transform: uppercase; margin: 10px 0 5px 0; }
        input { width: 100%; accent-color: #859900; margin-bottom: 5px; }
        #telemetry { font-size: 11px; color: #268bd2; line-height: 1.4; background: #00212b; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="world-pane"><canvas id="simCanvas"></canvas></div>

<div id="ui-sidebar">
    <h3 style="margin:0 0 10px 0; color:#b58900;">NAV RECOVERY</h3>
    <div id="telemetry">
        WP: <span id="wp-val">1</span><br>
        CTE: <span id="cte-val">0</span> ft<br>
        SPD: <span id="speed-val">0.0</span> kts
    </div>

    <div class="label">Wind Direction: <span id="wd-disp">45</span>°</div>
    <input type="range" id="windDir" min="0" max="360" value="45">
    
    <div class="label">Wind Speed: <span id="ws-disp">0</span> kts</div>
    <input type="range" id="windSpd" min="0" max="40" value="0">

    <div class="label">Stripchart</div>
    <div id="chart-box">
        <canvas id="chartCanvas"></canvas>
    </div>
</div>

<script>
const simCanvas = document.getElementById('simCanvas');
const sCtx = simCanvas.getContext('2d');
const chartCanvas = document.getElementById('chartCanvas');
const cCtx = chartCanvas.getContext('2d');

const KNOTS_TO_FTS = 1.68781;
let PX_PER_FT = 1.0; 
let wind = { angle: 45 * Math.PI/180, speed: 0 }; 
let waypoints = [];
let currentWPIndex = 0;
let history = [];
let boat = { x: 0, y: 0, theta: 0, omega: 0 };
let camera = { zoom: 1.0, x: 0, y: 0 };

function resize() {
    simCanvas.width = simCanvas.offsetWidth;
    simCanvas.height = simCanvas.offsetHeight;
    chartCanvas.width = chartCanvas.offsetWidth;
    chartCanvas.height = chartCanvas.offsetHeight;
    
    // Ensure scaling is consistent
    PX_PER_FT = Math.min(simCanvas.width, simCanvas.height) / 1500;
    
    const d = 400 * PX_PER_FT; 
    const r = 100 * PX_PER_FT;
    waypoints = [
        {x: d, y: -d, r: r, id: "1"}, {x: d, y: d, r: r, id: "2"},
        {x: -d, y: d, r: r, id: "3"}, {x: -d, y: -d, r: r, id: "4"}
    ];
}

// Input listeners with explicit Number casting
document.getElementById('windDir').oninput = e => {
    let val = parseFloat(e.target.value);
    wind.angle = val * Math.PI/180;
    document.getElementById('wd-disp').innerText = val;
};
document.getElementById('windSpd').oninput = e => {
    let val = parseFloat(e.target.value);
    wind.speed = val * KNOTS_TO_FTS;
    document.getElementById('ws-disp').innerText = val;
};

function update() {
    if (waypoints.length === 0) return;

    let pA = currentWPIndex === 0 ? waypoints[waypoints.length-1] : waypoints[currentWPIndex-1];
    let pB = waypoints[currentWPIndex];

    let dx = pB.x - pA.x, dy = pB.y - pA.y, pathLen = Math.hypot(dx, dy);
    let ux = dx/pathLen, uy = dy/pathLen, nx = -uy, ny = ux;
    let bx = boat.x - pA.x, by = boat.y - pA.y;
    let atd = bx * ux + by * uy, cte = bx * nx + by * ny;

    if (Math.hypot(pB.x - boat.x, pB.y - boat.y) < pB.r) currentWPIndex = (currentWPIndex + 1) % waypoints.length;

    // Unit Vector Navigation
    let lookAhead = 300 * PX_PER_FT;
    let targetVecX = ux * lookAhead - nx * cte * 0.5;
    let targetVecY = uy * lookAhead - ny * cte * 0.5;
    
    let dot = Math.cos(boat.theta) * targetVecX + Math.sin(boat.theta) * targetVecY;
    let det = Math.cos(boat.theta) * targetVecY - Math.sin(boat.theta) * targetVecX;
    let hErr = Math.atan2(det, dot);

    // Physics
    boat.omega += (hErr * 4.0 - boat.omega * 6.0) * 0.016;
    boat.theta += boat.omega * 0.016;
    
    let speed = wind.speed * 0.4 * (1.0 - Math.min(0.8, Math.abs(hErr)));
    boat.x += Math.cos(boat.theta) * speed;
    boat.y += Math.sin(boat.theta) * speed;

    // Telemetry UI
    document.getElementById('cte-val').innerText = (cte/PX_PER_FT).toFixed(0);
    document.getElementById('wp-val').innerText = pB.id;
    document.getElementById('speed-val').innerText = (speed / KNOTS_TO_FTS).toFixed(1);

    history.push({cte: cte/PX_PER_FT, err: hErr});
    if(history.length > chartCanvas.width) history.shift();
}

function draw() {
    sCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
    sCtx.save();
    // Centering the camera
    sCtx.translate(simCanvas.width/2, simCanvas.height/2);
    sCtx.scale(camera.zoom, camera.zoom);
    sCtx.translate(camera.x, camera.y);
    
    waypoints.forEach((wp, i) => {
        let prev = i === 0 ? waypoints[waypoints.length-1] : waypoints[i-1];
        let dx = wp.x - prev.x, dy = wp.y - prev.y, ang = Math.atan2(dy, dx);
        
        // Corridor Lane
        sCtx.strokeStyle = "rgba(88, 110, 117, 0.2)";
        sCtx.setLineDash([10, 10]);
        sCtx.beginPath();
        sCtx.moveTo(prev.x + wp.r * Math.cos(ang + Math.PI/2), prev.y + wp.r * Math.sin(ang + Math.PI/2));
        sCtx.lineTo(wp.x + wp.r * Math.cos(ang + Math.PI/2), wp.y + wp.r * Math.sin(ang + Math.PI/2));
        sCtx.moveTo(prev.x + wp.r * Math.cos(ang - Math.PI/2), prev.y + wp.r * Math.sin(ang - Math.PI/2));
        sCtx.lineTo(wp.x + wp.r * Math.cos(ang - Math.PI/2), wp.y + wp.r * Math.sin(ang - Math.PI/2));
        sCtx.stroke();
        sCtx.setLineDash([]);

        sCtx.strokeStyle = (i===currentWPIndex) ? "#859900" : "#073642";
        sCtx.lineWidth = 2/camera.zoom;
        sCtx.beginPath(); sCtx.arc(wp.x, wp.y, wp.r, 0, Math.PI*2); sCtx.stroke();
    });

    // Draw Boat
    sCtx.save();
    sCtx.translate(boat.x, boat.y);
    sCtx.rotate(boat.theta);
    sCtx.strokeStyle = "#eee8d5";
    sCtx.lineWidth = 2/camera.zoom;
    sCtx.strokeRect(-15, -8, 30, 16); // Slightly larger boat
    sCtx.fillStyle = "#dc322f";
    sCtx.fillRect(10, -3, 6, 6); // Bow Marker
    sCtx.restore();

    sCtx.restore();

    // Sidebar Stripchart
    cCtx.fillStyle = "#001e26"; cCtx.fillRect(0,0,chartCanvas.width, chartCanvas.height);
    cCtx.strokeStyle = "#586e75"; cCtx.beginPath(); cCtx.moveTo(0,70); cCtx.lineTo(chartCanvas.width, 70); cCtx.stroke();
    cCtx.lineWidth = 2;
    cCtx.strokeStyle = "#b58900"; cCtx.beginPath();
    history.forEach((h, i) => { if(i===0) cCtx.moveTo(i, 70-h.cte*0.4); else cCtx.lineTo(i, 70-h.cte*0.4); });
    cCtx.stroke();
    cCtx.strokeStyle = "#2aa198"; cCtx.beginPath();
    history.forEach((h, i) => { if(i===0) cCtx.moveTo(i, 70-h.err*25); else cCtx.lineTo(i, 70-h.err*25); });
    cCtx.stroke();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize', resize);
resize(); loop();
</script>
</body>
</html>
