<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sailboat: Zero-Wind Baseline</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #002b36; font-family: monospace; }
        #world-pane { position: absolute; top: 0; left: 0; right: 280px; bottom: 0; background: #eee8d5; }
        #ui-sidebar { 
            position: absolute; top: 0; right: 0; width: 280px; bottom: 0; 
            background: #073642; border-left: 5px solid #586e75; 
            padding: 15px; box-sizing: border-box; color: #93a1a1;
            display: flex; flex-direction: column;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #chart-box { width: 100%; height: 180px; background: #001e26; margin-top: auto; border: 3px solid #268bd2; }
        .label { font-size: 11px; text-transform: uppercase; margin: 15px 0 5px 0; font-weight: bold; color: #859900; }
        #telemetry { font-size: 12px; color: #268bd2; background: #00212b; padding: 10px; border: 1px solid #586e75; }
    </style>
</head>
<body>

<div id="world-pane"><canvas id="simCanvas"></canvas></div>

<div id="ui-sidebar">
    <h3 style="margin:0; color:#b58900;">NAV DEBUGGER</h3>
    <div id="telemetry">
        LEG: <span id="leg-val">Origin -> WP1</span><br>
        REL BRG: <span id="brg-val">0</span>°<br>
        WIND SPD: <span id="ws-val">0</span> kts
    </div>
    
    <div class="label">Wind Controls</div>
    <label style="font-size: 9px;">DIRECTION</label>
    <input type="range" id="windDir" min="0" max="360" value="45">
    <label style="font-size: 9px;">SPEED (KTS)</label>
    <input type="range" id="windSpd" min="0" max="40" value="0">

    <div id="chart-box"><canvas id="chartCanvas"></canvas></div>
</div>

<script>
const simCanvas = document.getElementById('simCanvas');
const sCtx = simCanvas.getContext('2d');
const chartCanvas = document.getElementById('chartCanvas');
const cCtx = chartCanvas.getContext('2d');

let PX_PER_FT;
const KNOTS_TO_FTS = 1.68781;
// DEFAULT WIND SPEED IS NOW ZERO
let trueWind = { angle: 0.78, speed: 0 }; 
let waypoints = [];
let currentWPIndex = 1;
let history = [];
const boat = { x: 0, y: 0, theta: 0, omega: 0, sails: [{x: 5, a:0}, {x: -5, a:0}] };

function norm(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a < -Math.PI) a += 2 * Math.PI;
    return a;
}

function resize() {
    simCanvas.width = simCanvas.offsetWidth;
    simCanvas.height = simCanvas.offsetHeight;
    chartCanvas.width = chartCanvas.offsetWidth;
    chartCanvas.height = chartCanvas.offsetHeight;
    PX_PER_FT = Math.min(simCanvas.width, simCanvas.height) / 2000;
    
    const d = 500 * PX_PER_FT, r = 120 * PX_PER_FT;
    waypoints = [
        {x: 0,  y: 0,  r: r, id: "ORIGIN"},
        {x: d,  y: -d, r: r, id: "WP1"},
        {x: d,  y: d,  r: r, id: "WP2"},
        {x: -d, y: d,  r: r, id: "WP3"},
        {x: -d, y: -d, r: r, id: "WP4"}
    ];
}

document.getElementById('windDir').oninput = e => trueWind.angle = e.target.value * Math.PI/180;
document.getElementById('windSpd').oninput = e => {
    trueWind.speed = e.target.value * KNOTS_TO_FTS;
    document.getElementById('ws-val').innerText = e.target.value;
};

function update() {
    let pA = waypoints[(currentWPIndex === 0) ? waypoints.length-1 : currentWPIndex-1];
    let pB = waypoints[currentWPIndex];

    let dx = pB.x - boat.x;
    let dy = pB.y - boat.y;
    let relBearing = norm(Math.atan2(dy, dx) - boat.theta);
    let relWind = norm((trueWind.angle + Math.PI) - boat.theta);

    if (Math.hypot(dx, dy) < pB.r) {
        currentWPIndex = (currentWPIndex + 1) % waypoints.length;
    }

    // Navigation logic (stays active, but provides no movement if speed is 0)
    boat.omega += (relBearing * 5.0 - boat.omega * 6.0) * 0.016;
    boat.theta = norm(boat.theta + boat.omega * 0.016);
    
    let sailAOA = Math.sign(Math.sin(relWind)) * 0.22;
    boat.sails.forEach(s => s.a = relWind + sailAOA);

    // Physics
    let thrust = trueWind.speed * 0.5 * (1.0 - Math.abs(relBearing)/Math.PI);
    boat.x += Math.cos(boat.theta) * thrust;
    boat.y += Math.sin(boat.theta) * thrust;

    document.getElementById('leg-val').innerText = `${pA.id} -> ${pB.id}`;
    document.getElementById('brg-val').innerText = (relBearing * 180/Math.PI).toFixed(0);
    
    history.push(relBearing);
    if(history.length > chartCanvas.width) history.shift();
}

function draw() {
    sCtx.clearRect(0,0,simCanvas.width, simCanvas.height);
    sCtx.save(); sCtx.translate(simCanvas.width/2, simCanvas.height/2);
    
    // HEAVY WEIGHT RENDERING (6px)
    waypoints.forEach((wp, i) => {
        let prev = (i === 0) ? waypoints[waypoints.length - 1] : waypoints[i-1];
        let ang = Math.atan2(wp.y - prev.y, wp.x - prev.x);
        
        sCtx.lineWidth = 6;
        sCtx.strokeStyle = (i === currentWPIndex) ? "rgba(181, 137, 0, 0.4)" : "rgba(88, 110, 117, 0.1)";
        sCtx.beginPath();
        sCtx.moveTo(prev.x + wp.r*Math.cos(ang+1.57), prev.y + wp.r*Math.sin(ang+1.57));
        sCtx.lineTo(wp.x + wp.r*Math.cos(ang+1.57), wp.y + wp.r*Math.sin(ang+1.57));
        sCtx.moveTo(prev.x + wp.r*Math.cos(ang-1.57), prev.y + wp.r*Math.sin(ang-1.57));
        sCtx.lineTo(wp.x + wp.r*Math.cos(ang-1.57), wp.y + wp.r*Math.sin(ang-1.57));
        sCtx.stroke();

        sCtx.strokeStyle = (i === currentWPIndex) ? "#b58900" : "#93a1a1";
        sCtx.beginPath(); sCtx.arc(wp.x, wp.y, wp.r, 0, 7); sCtx.stroke();

        sCtx.save(); sCtx.translate(wp.x, wp.y); sCtx.rotate(trueWind.angle);
        sCtx.strokeStyle = "#268bd2"; sCtx.lineWidth = 3;
        sCtx.beginPath(); sCtx.moveTo(-30,0); sCtx.lineTo(30,0); sCtx.lineTo(20,-10); sCtx.moveTo(30,0); sCtx.lineTo(20,10);
        sCtx.stroke(); sCtx.restore();
    });

    sCtx.save(); sCtx.translate(boat.x, boat.y); sCtx.rotate(boat.theta);
    sCtx.strokeStyle = "#073642"; sCtx.lineWidth = 4;
    sCtx.strokeRect(-18,-10,36,20);
    sCtx.fillStyle = "#dc322f"; sCtx.fillRect(12,-5,8,10);
    
    boat.sails.forEach(s => {
        sCtx.save(); sCtx.translate(s.x, 0); sCtx.rotate(s.a);
        sCtx.fillStyle = "#2aa198"; sCtx.fillRect(-15, -3, 30, 6);
        sCtx.restore();
    });
    sCtx.restore(); sCtx.restore();

    cCtx.fillStyle = "#001e26"; cCtx.fillRect(0,0,chartCanvas.width, chartCanvas.height);
    cCtx.strokeStyle = "#2aa198"; cCtx.lineWidth = 2;
    cCtx.beginPath();
    history.forEach((h, i) => { let y = 90 - h*30; if(i===0) cCtx.moveTo(i, y); else cCtx.lineTo(i, y); });
    cCtx.stroke();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.onresize = resize; resize(); loop();
</script>
</body>
</html>
