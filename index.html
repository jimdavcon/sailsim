<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Autonomous Sailboat: Full Wind Range</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #002b36; font-family: 'Courier New', monospace; display: flex; height: 100vh; }
        #world-container { width: 90%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #586e75; }
        #ui-sidebar { width: 10%; height: 100%; background: #002b36; padding: 15px; box-sizing: border-box; color: #859900; min-width: 170px; z-index: 10; }
        .section { margin-bottom: 20px; border-bottom: 1px solid #073642; padding-bottom: 10px; }
        .label { font-size: 10px; color: #93a1a1; text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; accent-color: #859900; cursor: pointer; }
        #telemetry { color: #268bd2; font-size: 11px; white-space: pre-wrap; line-height: 1.5; }
        h3 { font-size: 14px; margin: 0 0 15px 0; color: #b58900; border-bottom: 2px solid #b58900; }
    </style>
</head>
<body>

<div id="world-container"><canvas id="simCanvas"></canvas></div>

<div id="ui-sidebar">
    <h3>WIND & PRIORITY</h3>
    <div class="section">
        <div class="label">Wind Direction</div>
        <input type="range" id="windDir" min="0" max="360" value="45">
        <span id="wdVal">45</span>°
    </div>
    <div class="section">
        <div class="label">Wind Speed</div>
        <input type="range" id="windSpd" min="0" max="40" value="15">
        <span id="wsVal">15</span> kts
    </div>
    <div class="section">
        <div class="label">Real-time Data</div>
        <div id="telemetry">Ready...</div>
    </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('world-container');

let WORLD_SIZE_FT = 2000;
let PX_PER_FT;
const KNOTS_TO_FTS = 1.68781;
const STALL_LIMIT = 0.25;

let wind = { angle: 45 * Math.PI/180, speed: 15 * KNOTS_TO_FTS };
let waypoints = [];
let currentWPIndex = 0;
let tackState = 0; 

const boat = {
    l: 6, w: 2, x: 0, y: 0, theta: 0, vx: 0, vy: 0, omega: 0,
    sails: [{ x_off: 3.5, alpha: 0, angle: 0 }, { x_off: -3.5, alpha: 0, angle: 0 }]
};

function resize() {
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    PX_PER_FT = Math.min(canvas.width, canvas.height) / WORLD_SIZE_FT;
    if (waypoints.length === 0) initSquareMission();
}

function initSquareMission() {
    const d = 500 * PX_PER_FT;
    const r = 100 * PX_PER_FT; 
    waypoints = [
        { x:  d, y: -d, r: r },
        { x:  d, y:  d, r: r },
        { x: -d, y:  d, r: r },
        { x: -d, y: -d, r: r }
    ];
}

document.getElementById('windDir').oninput = e => { wind.angle = e.target.value * Math.PI/180; document.getElementById('wdVal').innerText = e.target.value; };
document.getElementById('windSpd').oninput = e => { 
    wind.speed = e.target.value * KNOTS_TO_FTS; 
    document.getElementById('wsVal').innerText = e.target.value; 
};

function update(dt) {
    const pA = (currentWPIndex === 0) ? {x:0, y:0, r:100*PX_PER_FT} : waypoints[currentWPIndex - 1];
    const pB = waypoints[currentWPIndex];
    
    const dx = pB.x - pA.x, dy = pB.y - pA.y;
    const pathLen = Math.hypot(dx, dy);
    const uX = dx / pathLen, uY = dy / pathLen;
    
    const atd = (boat.x - pA.x) * uX + (boat.y - pA.y) * uY;
    const cte = (boat.x - pA.x) * (-uY) + (boat.y - pA.y) * uX;
    const distToDest = Math.hypot(pB.x - boat.x, pB.y - boat.y);

    if (atd >= pathLen && distToDest <= pB.r) {
        currentWPIndex = (currentWPIndex + 1) % waypoints.length;
        tackState = 0;
    }

    // PRIORITY LOGIC
    let steerGain = 2.0;
    let speedScalar = 1.0;

    if (Math.abs(cte) > pB.r) {
        tackState = (cte > 0) ? -1 : 1; 
        steerGain = 4.5;    
        speedScalar = 0.4;  
    } else if (tackState !== 0) {
        if ((tackState === 1 && cte > 0) || (tackState === -1 && cte < 0)) tackState = 0;
    }

    let targetX, targetY;
    if (tackState === 0) {
        targetX = pB.x; targetY = pB.y;
    } else {
        const lookAhead = 250 * PX_PER_FT;
        targetX = pA.x + (atd + lookAhead) * uX + (tackState * pB.r) * (-uY);
        targetY = pA.y + (atd + lookAhead) * uY + (tackState * pB.r) * uX;
    }

    let hErr = Math.atan2(targetY - boat.y, targetX - boat.x) - boat.theta;
    while(hErr > Math.PI) hErr -= 2*Math.PI; while(hErr < -Math.PI) hErr += 2*Math.PI;

    boat.omega += (hErr * steerGain - boat.omega * 5.0) * dt;
    boat.theta += boat.omega * dt;
    
    // Boat speed is now more sensitive to wind speed
    const baseSpeed = 2.0 + (wind.speed * 0.25); 
    boat.vx = Math.cos(boat.theta) * baseSpeed * speedScalar;
    boat.vy = Math.sin(boat.theta) * baseSpeed * speedScalar;
    boat.x += boat.vx; boat.y += boat.vy;

    // Visual Sail Position
    boat.sails.forEach((s) => {
        const wRel = Math.atan2(Math.sin(wind.angle), Math.cos(wind.angle)) - boat.theta;
        s.alpha = (tackState !== 0) ? (hErr * 0.4) : (Math.sign(Math.sin(wRel)) * -0.2);
        s.angle = wind.angle + s.alpha;
    });

    document.getElementById('telemetry').innerText = 
        `WIND: ${(wind.speed/KNOTS_TO_FTS).toFixed(1)} kts\nPRIORITY: ${tackState === 0 ? 'SPEED' : 'STEERING'}\nCTE: ${(cte/PX_PER_FT).toFixed(1)} ft`;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2);

    // Corridor
    waypoints.forEach((wp, i) => {
        const prev = (i === 0) ? {x:0, y:0, r:100*PX_PER_FT} : waypoints[i-1];
        const dx = wp.x - prev.x, dy = wp.y - prev.y, ang = Math.atan2(dy, dx);
        ctx.strokeStyle = (i === currentWPIndex) ? (tackState === 0 ? "#859900" : "#dc322f") : "rgba(88, 110, 117, 0.2)";
        ctx.beginPath();
        ctx.moveTo(prev.x + prev.r * Math.cos(ang + Math.PI/2), prev.y + prev.r * Math.sin(ang + Math.PI/2));
        ctx.lineTo(wp.x + wp.r * Math.cos(ang + Math.PI/2), wp.y + wp.r * Math.sin(ang + Math.PI/2));
        ctx.moveTo(prev.x + prev.r * Math.cos(ang - Math.PI/2), prev.y + prev.r * Math.sin(ang - Math.PI/2));
        ctx.lineTo(wp.x + wp.r * Math.cos(ang - Math.PI/2), wp.y + wp.r * Math.sin(ang - Math.PI/2));
        ctx.stroke();
    });

    // Boat
    ctx.save(); ctx.translate(boat.x, boat.y); ctx.rotate(boat.theta);
    ctx.strokeStyle = "#eee8d5"; ctx.strokeRect(-12, -6, 24, 12);
    ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(12, 0, 3, 0, Math.PI*2); ctx.fill();
    boat.sails.forEach(s => {
        ctx.save(); ctx.translate(s.x_off, 0); ctx.rotate(s.angle - boat.theta);
        ctx.fillStyle = "rgba(42, 161, 152, 0.8)"; ctx.fillRect(-10, -2, 20, 4);
        ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(10, 0, 2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });
    ctx.restore(); ctx.restore();
}

function loop() { update(0.016); draw(); requestAnimationFrame(loop); }
window.onresize = resize; resize(); loop();
</script>
</body>
</html>
