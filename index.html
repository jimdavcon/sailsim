<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sailboat: High-Gain PID & AOA Monitor</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #002b36; font-family: monospace; }
        #world-pane { position: absolute; top: 0; left: 0; right: 280px; bottom: 0; background: #eee8d5; }
        #ui-sidebar { 
            position: absolute; top: 0; right: 0; width: 280px; bottom: 0; 
            background: #073642; border-left: 5px solid #586e75; 
            padding: 15px; box-sizing: border-box; color: #93a1a1;
            display: flex; flex-direction: column;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #chart-box { width: 100%; height: 160px; background: #001e26; margin-top: auto; border: 2px solid #268bd2; }
        .label { font-size: 11px; text-transform: uppercase; margin: 12px 0 5px 0; font-weight: bold; color: #859900; }
        #telemetry { font-size: 12px; color: #268bd2; background: #00212b; padding: 10px; border: 1px solid #586e75; line-height: 1.4; }
        input[type=range] { width: 100%; margin: 5px 0; }
        .val-disp { float: right; color: #b58900; }
        .aoa-box { color: #2aa198; font-weight: bold; }
    </style>
</head>
<body>

<div id="world-pane"><canvas id="simCanvas"></canvas></div>

<div id="ui-sidebar">
    <h3 style="margin:0; color:#b58900;">WIND-WING CONTROL</h3>
    <div id="telemetry">
        CTE: <span id="cte-val">0</span> ft<br>
        I-OFFSET: <span id="corr-val">0</span> ft<br>
        WING 1 AOA: <span id="aoa1-val" class="aoa-box">0</span>°<br>
        WING 2 AOA: <span id="aoa2-val" class="aoa-box">0</span>°
    </div>
    
    <div class="label">PID GAINS</div>
    <label>AUTHORITY (P) <span class="val-disp" id="p-val">72</span></label>
    <input type="range" id="gainP" min="0" max="150" value="72">

    <label>CORRECTION (I) <span class="val-disp" id="i-val">0.8</span></label>
    <input type="range" id="gainI" min="0" max="5" step="0.1" value="0.8">

    <label>DAMPING (D) <span class="val-disp" id="d-val">12</span></label>
    <input type="range" id="gainD" min="0" max="50" value="12">

    <div class="label">ENVIRONMENT</div>
    <label>WIND DIRECTION</label>
    <input type="range" id="windDir" min="0" max="360" value="45">
    <label>WIND SPEED (KTS)</label>
    <input type="range" id="windSpd" min="0" max="40" value="15">

    <div class="label">CTE HISTORY</div>
    <div id="chart-box"><canvas id="chartCanvas"></canvas></div>
</div>

<script>
const simCanvas = document.getElementById('simCanvas');
const sCtx = simCanvas.getContext('2d');
const chartCanvas = document.getElementById('chartCanvas');
const cCtx = chartCanvas.getContext('2d');

let PX_PER_FT;
const KNOTS_TO_FTS = 1.68781;
let trueWind = { angle: 0.78, speed: 15 * KNOTS_TO_FTS }; 
let waypoints = [];
let currentWPIndex = 1;
let history = [];
let cteIntegral = 0; 
let lastTarget = {x: 0, y: 0};

// Specified Default Gains
let Kp = 72;
let Ki = 0.8;
let Kd = 12;

const boat = { x: 0, y: 0, theta: 0, omega: 0, sails: [{x: 8, a:0, aoa:0}, {x: -8, a:0, aoa:0}] };

function norm(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a < -Math.PI) a += 2 * Math.PI;
    return a;
}

function resize() {
    simCanvas.width = simCanvas.offsetWidth;
    simCanvas.height = simCanvas.offsetHeight;
    chartCanvas.width = chartCanvas.offsetWidth;
    chartCanvas.height = chartCanvas.offsetHeight;
    PX_PER_FT = Math.min(simCanvas.width, simCanvas.height) / 2000;
    
    const d = 500 * PX_PER_FT, r = 120 * PX_PER_FT;
    waypoints = [
        {x: 0,  y: 0,  r: r, id: "ORIGIN"},
        {x: d,  y: -d, r: r, id: "WP1"},
        {x: d,  y: d,  r: r, id: "WP2"},
        {x: -d, y: d,  r: r, id: "WP3"},
        {x: -d, y: -d, r: r, id: "WP4"}
    ];
}

document.getElementById('gainP').oninput = e => { Kp = parseFloat(e.target.value); document.getElementById('p-val').innerText = Kp; };
document.getElementById('gainI').oninput = e => { Ki = parseFloat(e.target.value); document.getElementById('i-val').innerText = Ki; };
document.getElementById('gainD').oninput = e => { Kd = parseFloat(e.target.value); document.getElementById('d-val').innerText = Kd; };
document.getElementById('windDir').oninput = e => { trueWind.angle = e.target.value * Math.PI/180; };
document.getElementById('windSpd').oninput = e => { trueWind.speed = e.target.value * KNOTS_TO_FTS; };

function update() {
    let pA = waypoints[(currentWPIndex === 0) ? waypoints.length-1 : currentWPIndex-1];
    let pB = waypoints[currentWPIndex];

    let dx = pB.x - pA.x, dy = pB.y - pA.y;
    let pathLen = Math.hypot(dx, dy);
    let ux = dx / pathLen, uy = dy / pathLen; 
    let nx = -uy, ny = ux; 

    let bdx = boat.x - pA.x, bdy = boat.y - pA.y;
    let atd = bdx * ux + bdy * uy; 
    let cte = bdx * nx + bdy * ny; 

    cteIntegral += (cte / PX_PER_FT) * Ki * 0.016;
    cteIntegral = Math.max(-600, Math.min(600, cteIntegral));

    let remainingDist = pathLen - atd;
    let targetAt = atd + (remainingDist * 0.5);
    let targetBaseX = pA.x + targetAt * ux;
    let targetBaseY = pA.y + targetAt * uy;

    lastTarget.x = targetBaseX - (nx * cteIntegral * PX_PER_FT);
    lastTarget.y = targetBaseY - (ny * cteIntegral * PX_PER_FT);

    let relBearing = norm(Math.atan2(lastTarget.y - boat.y, lastTarget.x - boat.x) - boat.theta);
    let relWind = norm((trueWind.angle + Math.PI) - boat.theta);

    if (Math.hypot(pB.x - boat.x, pB.y - boat.y) < pB.r) {
        currentWPIndex = (currentWPIndex + 1) % waypoints.length;
        cteIntegral = 0;
    }

    boat.omega += (relBearing * Kp - boat.omega * Kd) * 0.016;
    boat.theta = norm(boat.theta + boat.omega * 0.016);
    
    // Calculate and Trim Sails
    let targetAOA = 0.22; // ~12.6 degrees
    boat.sails.forEach((s, idx) => {
        let sign = Math.sign(Math.sin(relWind));
        s.a = relWind + (sign * targetAOA);
        s.aoa = targetAOA * (180/Math.PI) * sign; // Store AOA for display
    });

    let thrust = trueWind.speed * 0.4 * (1.0 - Math.abs(relBearing)/Math.PI);
    boat.x += Math.cos(boat.theta) * thrust;
    boat.y += Math.sin(boat.theta) * thrust;

    document.getElementById('cte-val').innerText = (cte/PX_PER_FT).toFixed(0);
    document.getElementById('corr-val').innerText = (cteIntegral).toFixed(1);
    document.getElementById('aoa1-val').innerText = boat.sails[0].aoa.toFixed(1);
    document.getElementById('aoa2-val').innerText = boat.sails[1].aoa.toFixed(1);
    
    history.push(cte/PX_PER_FT);
    if(history.length > chartCanvas.width) history.shift();
}

function draw() {
    sCtx.clearRect(0,0,simCanvas.width, simCanvas.height);
    sCtx.save(); sCtx.translate(simCanvas.width/2, simCanvas.height/2);
    
    waypoints.forEach((wp, i) => {
        let prev = (i === 0) ? waypoints[waypoints.length - 1] : waypoints[i-1];
        let ang = Math.atan2(wp.y - prev.y, wp.x - prev.x);
        sCtx.setLineDash([10, 10]); sCtx.lineWidth = 2; sCtx.strokeStyle = "rgba(88, 110, 117, 0.4)";
        sCtx.beginPath(); sCtx.moveTo(prev.x, prev.y); sCtx.lineTo(wp.x, wp.y); sCtx.stroke();
        sCtx.setLineDash([]);
        sCtx.lineWidth = 6;
        sCtx.strokeStyle = (i === currentWPIndex) ? "rgba(181, 137, 0, 0.3)" : "rgba(88, 110, 117, 0.1)";
        sCtx.beginPath();
        sCtx.moveTo(prev.x + wp.r*Math.cos(ang+1.57), prev.y + wp.r*Math.sin(ang+1.57));
        sCtx.lineTo(wp.x + wp.r*Math.cos(ang+1.57), wp.y + wp.r*Math.sin(ang+1.57));
        sCtx.moveTo(prev.x + wp.r*Math.cos(ang-1.57), prev.y + wp.r*Math.sin(ang-1.57));
        sCtx.lineTo(wp.x + wp.r*Math.cos(ang-1.57), wp.y + wp.r*Math.sin(ang-1.57));
        sCtx.stroke();
        sCtx.strokeStyle = (i === currentWPIndex) ? "#b58900" : "#93a1a1";
        sCtx.beginPath(); sCtx.arc(wp.x, wp.y, wp.r, 0, 7); sCtx.stroke();
    });

    sCtx.fillStyle = "#268bd2";
    sCtx.beginPath(); sCtx.arc(lastTarget.x, lastTarget.y, 8, 0, 7); sCtx.fill();

    sCtx.save(); sCtx.translate(boat.x, boat.y); sCtx.rotate(boat.theta);
    sCtx.strokeStyle = "#073642"; sCtx.lineWidth = 4;
    sCtx.strokeRect(-20,-12,40,24);
    sCtx.fillStyle = "#dc322f"; sCtx.fillRect(15,-6,10,12);
    
    boat.sails.forEach(s => {
        sCtx.save(); sCtx.translate(s.x, 0); sCtx.rotate(s.a);
        sCtx.fillStyle = "#2aa198"; sCtx.fillRect(-18, -3, 36, 6);
        sCtx.fillStyle = "#dc322f"; sCtx.beginPath(); sCtx.arc(18, 0, 4, 0, 7); sCtx.fill();
        sCtx.restore();
    });
    sCtx.restore(); sCtx.restore();

    cCtx.fillStyle = "#001e26"; cCtx.fillRect(0,0,chartCanvas.width, chartCanvas.height);
    cCtx.strokeStyle = "#268bd2"; cCtx.lineWidth = 2;
    cCtx.beginPath();
    history.forEach((h, i) => { let y = 80 - h*0.4; if(i===0) cCtx.moveTo(i, y); else cCtx.lineTo(i, y); });
    cCtx.stroke();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.onresize = resize; resize(); loop();
</script>
</body>
</html>
