<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sailing Sim: Wing Alignment Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #002b36; font-family: monospace; }
        #world-pane { position: absolute; top: 0; left: 0; right: 280px; bottom: 0; background: #eee8d5; }
        #ui-sidebar { position: absolute; top: 0; right: 0; width: 280px; bottom: 0; background: #073642; color: #93a1a1; padding: 15px; box-sizing: border-box; border-left: 4px solid #586e75; z-index: 10; }
        canvas { width: 100%; height: 100%; display: block; }
        .telemetry { background: #00212b; padding: 10px; border: 1px solid #586e75; font-size: 11px; color: #268bd2; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: bold; color: #859900; display: block; margin-top: 5px; }
        input[type=range] { width: 100%; margin: 5px 0; }
        .val { float: right; color: #b58900; }
    </style>
</head>
<body>

<div id="world-pane"><canvas id="simCanvas"></canvas></div>

<div id="ui-sidebar">
    <h3 style="color:#b58900; margin-top:0;">WING ALIGNMENT</h3>
    <div class="telemetry">
        SPD: <span id="spd-val">0</span> kts<br>
        W-CL: <span id="cl-val">0</span> | H-CL: <span id="hcl-val">0</span><br>
        REL WIND: <span id="rel-w">0</span>°
    </div>
    
    <label>WIND SPEED (KTS) <span class="val" id="wsv">0</span></label>
    <input type="range" id="wSpd" min="0" max="80" value="15">

    <label>WIND DIRECTION <span class="val" id="wdv">45°</span></label>
    <input type="range" id="wDir" min="0" max="360" value="45">

    <label>DAMPING <span class="val" id="dv">15</span></label>
    <input type="range" id="gD" min="1" max="50" value="15">
</div>

<script>
window.onload = function() {
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const KNOTS_TO_FTS = 1.68781;
    const AIR_DENSITY = 1.225;
    const WATER_DENSITY = 1025;
    const POLAR = { 0:[0,0.01], 5:[0.5,0.02], 10:[1.0,0.04], 12.6:[1.2,0.06], 15:[1.4,0.1], 20:[0.8,0.3], 30:[0.5,0.6], 90:[0,1.2] };

    let Kp = 72, Ki = 0.8, Kd = 15;
    let trueWind = { angle: 45 * Math.PI/180, speed: 15 * KNOTS_TO_FTS };
    let boat = { x:0, y:0, theta:0, omega:0, vx:0, vy:0, sails:[{x:14, a:0}, {x:-14, a:0}] };
    let waypoints = [], currentWP = 1, cteInt = 0, lastT = {x:0, y:0}, PX_PER_FT = 1;

    function getCoeffs(aoaRad) {
        let deg = Math.min(90, Math.abs(aoaRad * 180 / Math.PI));
        let keys = Object.keys(POLAR).map(Number).sort((a,b)=>a-b);
        let cl = 0, cd = 1.2;
        for (let i=0; i<keys.length-1; i++) {
            if (deg >= keys[i] && deg <= keys[i+1]) {
                let t = (deg - keys[i]) / (keys[i+1] - keys[i]);
                cl = POLAR[keys[i]][0] + t*(POLAR[keys[i+1]][0]-POLAR[keys[i]][0]);
                cd = POLAR[keys[i]][1] + t*(POLAR[keys[i+1]][1]-POLAR[keys[i]][1]);
                break;
            }
        }
        return { cl: cl * Math.sign(aoaRad), cd: cd };
    }

    function resize() {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        PX_PER_FT = Math.min(canvas.width, canvas.height) / 2000;
        const d = 550 * PX_PER_FT, r = 120 * PX_PER_FT;
        waypoints = [{x:0,y:0,r:r}, {x:d,y:-d,r:r}, {x:d,y:d,r:r}, {x:-d,y:d,r:r}, {x:-d,y:-d,r:r}];
    }

    document.getElementById('wSpd').oninput = e => { trueWind.speed = +e.target.value * KNOTS_TO_FTS; document.getElementById('wsv').innerText = e.target.value; };
    document.getElementById('wDir').oninput = e => { trueWind.angle = +e.target.value * Math.PI/180; document.getElementById('wdv').innerText = e.target.value + "°"; };
    document.getElementById('gD').oninput = e => { Kd = +e.target.value; document.getElementById('dv').innerText = Kd; };

    function update() {
        const dt = 0.016;
        let pA = waypoints[currentWP === 0 ? waypoints.length-1 : currentWP-1];
        let pB = waypoints[currentWP];
        let dx = pB.x-pA.x, dy = pB.y-pA.y, dist = Math.hypot(dx,dy);
        let ux = dx/dist, uy = dy/dist, nx = -uy, ny = ux;
        let bx = boat.x-pA.x, by = boat.y-pA.y;
        let atd = bx*ux + by*uy, cte = bx*nx + by*ny;

        if (Math.hypot(pB.x-boat.x, pB.y-boat.y) < pB.r) { currentWP = (currentWP+1)%waypoints.length; cteInt = 0; }
        
        let pAng = Math.atan2(dy, dx), wAng = (trueWind.angle + Math.PI);
        let wDiff = Math.abs(pAng - wAng);
        while(wDiff > Math.PI) wDiff = Math.abs(wDiff - 2*Math.PI);
        let tOff = (wDiff < 0.75) ? (cte > 0 ? 200 : -200) * PX_PER_FT : 0;
        
        cteInt = Math.max(-1000, Math.min(1000, cteInt + (cte/PX_PER_FT) * Ki * dt));
        lastT.x = (pA.x + (atd + (dist-atd)*0.4)*ux) - (nx * (cteInt*PX_PER_FT + tOff));
        lastT.y = (pA.y + (atd + (dist-atd)*0.4)*uy) - (ny * (cteInt*PX_PER_FT + tOff));

        let rb = Math.atan2(lastT.y-boat.y, lastT.x-boat.x) - boat.theta;
        while(rb > Math.PI) rb -= 2*Math.PI; while(rb < -Math.PI) rb += 2*Math.PI;
        boat.omega = Math.max(-4, Math.min(4, boat.omega + (rb * Kp - boat.omega * Kd) * dt));
        boat.theta += boat.omega * dt;

        // --- Physics & Wing Alignment ---
        let tFx = 0, tFy = 0;
        let windGlobal = trueWind.angle + Math.PI; // Direction wind is BLOWING
        
        boat.sails.forEach(s => {
            let relWindGlobal = windGlobal - boat.theta;
            while(relWindGlobal > Math.PI) relWindGlobal -= 2*Math.PI;
            while(relWindGlobal < -Math.PI) relWindGlobal += 2*Math.PI;
            
            let side = Math.sign(Math.sin(relWindGlobal));
            let targetAoA = 0.22; // 12.6 degrees
            
            // The wing pivot angle (s.a) is the angle relative to the boat's centerline
            s.a = relWindGlobal + (side * targetAoA);
            
            let c = getCoeffs(targetAoA);
            let q = Math.min(6000, 0.5 * AIR_DENSITY * Math.pow(trueWind.speed, 2) * 6.0);
            
            // Thrust is projected into boat coordinates
            tFx += (c.cl * Math.sin(targetAoA) - c.cd * Math.cos(targetAoA)) * q;
            tFy += (c.cl * Math.cos(targetAoA) + c.cd * Math.sin(targetAoA)) * side * q;
            
            document.getElementById('cl-val').innerText = c.cl.toFixed(1);
            document.getElementById('rel-w').innerText = (relWindGlobal * 180 / Math.PI).toFixed(0);
        });

        let vF = boat.vx*Math.cos(boat.theta) + boat.vy*Math.sin(boat.theta);
        let vL = -boat.vx*Math.sin(boat.theta) + boat.vy*Math.cos(boat.theta);
        let hAOA = -Math.atan2(vL, vF || 0.0001);
        let hc = getCoeffs(hAOA), hq = 0.5 * WATER_DENSITY * (vF*vF + vL*vL) * 0.18;
        
        let accF = (tFx - (hc.cd*Math.cos(hAOA)-hc.cl*Math.sin(hAOA))*hq - Math.abs(vF)*0.2);
        let accL = (tFy + (hc.cl*Math.cos(hAOA)+hc.cd*Math.sin(hAOA))*hq);
        
        vF += Math.max(-100, Math.min(100, accF)) * dt;
        vL += Math.max(-100, Math.min(100, accL)) * dt;
        vF *= 0.992; vL *= 0.93;

        boat.vx = vF*Math.cos(boat.theta) - vL*Math.sin(boat.theta);
        boat.vy = vF*Math.sin(boat.theta) + vL*Math.cos(boat.theta);
        boat.x += boat.vx; boat.y += boat.vy;

        document.getElementById('spd-val').innerText = (vF/KNOTS_TO_FTS).toFixed(1);
        document.getElementById('hcl-val').innerText = hc.cl.toFixed(1);
    }

    function draw() {
        ctx.fillStyle = "#eee8d5"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
        
        // Grid
        ctx.strokeStyle = "rgba(0,0,0,0.03)"; ctx.lineWidth = 1;
        for(let i=-2000; i<2000; i+=100*PX_PER_FT){
            ctx.beginPath(); ctx.moveTo(i,-2000); ctx.lineTo(i,2000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-2000,i); ctx.lineTo(2000,i); ctx.stroke();
        }

        waypoints.forEach((wp, i) => {
            let p = waypoints[i===0?waypoints.length-1:i-1];
            let ang = Math.atan2(wp.y-p.y, wp.x-p.x);
            ctx.lineWidth = 6; ctx.strokeStyle = (i===currentWP)?"rgba(181,137,0,0.4)":"rgba(88,110,117,0.08)";
            ctx.beginPath();
            ctx.moveTo(p.x + wp.r*Math.cos(ang+1.57), p.y + wp.r*Math.sin(ang+1.57));
            ctx.lineTo(wp.x + wp.r*Math.cos(ang+1.57), wp.y + wp.r*Math.sin(ang+1.57));
            ctx.moveTo(p.x + wp.r*Math.cos(ang-1.57), p.y + wp.r*Math.sin(ang-1.57));
            ctx.lineTo(wp.x + wp.r*Math.cos(ang-1.57), wp.y + wp.r*Math.sin(ang-1.57));
            ctx.stroke();
            ctx.lineWidth = 2; ctx.strokeStyle = (i===currentWP)?"#b58900":"#93a1a1";
            ctx.beginPath(); ctx.arc(wp.x, wp.y, wp.r, 0, 7); ctx.stroke();
            ctx.save(); ctx.translate(wp.x, wp.y); ctx.rotate(trueWind.angle);
            ctx.strokeStyle = "#859900"; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(0,20); ctx.lineTo(-6,10); ctx.moveTo(0,20); ctx.lineTo(6,10); ctx.stroke();
            ctx.restore();
        });

        // Boat Render
        ctx.save(); ctx.translate(boat.x, boat.y); ctx.rotate(boat.theta);
        ctx.strokeStyle="#073642"; ctx.lineWidth=3; ctx.strokeRect(-18,-12,36,24);
        ctx.fillStyle="#dc322f"; ctx.fillRect(12,-4,8,8); // Bow
        
        boat.sails.forEach(s => {
            ctx.save(); ctx.translate(s.x, 0); ctx.rotate(s.a);
            // Wing Body
            ctx.fillStyle="#2aa198"; ctx.fillRect(-14,-2.5,28,5);
            // LEADING EDGE (Red Dot) - Must point toward wind
            ctx.fillStyle="#dc322f"; ctx.beginPath(); ctx.arc(14,0,4,0,7); ctx.fill();
            ctx.restore();
        });
        ctx.restore();
        
        ctx.fillStyle="#268bd2"; ctx.beginPath(); ctx.arc(lastT.x, lastT.y, 8, 0, 7); ctx.fill();
        ctx.restore();
    }

    function frame() { update(); draw(); requestAnimationFrame(frame); }
    window.onresize = resize; resize(); frame();
};
</script>
</body>
</html>
